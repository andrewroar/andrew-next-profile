name: Auto PR from dev to production

on:
  push:
    branches: [ "dev" ]

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GitHub CLI
        run: sudo apt-get install gh

      - name: Create PR from dev to production
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --base production --head dev --state open | grep -q . && echo "PR already exists" || \
          gh pr create --base production --head dev \
            --title "Sync dev → production" \
            --body "Automated PR to merge latest changes from \`dev\` into \`production\`."
